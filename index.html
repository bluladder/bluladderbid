    <!--
      Meta Pixel base loader. The pixel ID is injected at build time via
      the VITE_META_PIXEL_ID env variable. When missing, the pixel is not
      initialized and every fireLead/fireSchedule call becomes a no-op.
      Attribution capture still runs and dedupe still records event IDs.
    -->
    <script>
      (function () {
        var pixelId = "%VITE_META_PIXEL_ID%";
        if (!pixelId || pixelId.indexOf("VITE_META_PIXEL_ID") !== -1) return;
        !(function (f, b, e, v, n, t, s) {
          if (f.fbq) return;
          n = f.fbq = function () {
            n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
          };
          if (!f._fbq) f._fbq = n;
          n.push = n;
          n.loaded = !0;
          n.version = "2.0";
          n.queue = [];
          t = b.createElement(e);
          t.async = !0;
          t.src = v;
          s = b.getElementsByTagName(e)[0];
          s.parentNode.insertBefore(t, s);
        })(window, document, "script", "https://connect.facebook.net/en_US/fbevents.js");
        window.fbq("init", pixelId);
        window.fbq("track", "PageView");
      })();
    </script>
